[build]
  publish = "dist"
  command = "yarn build"

# Redirect admin to Laravel backend using env var
[[redirects]]
  from = "/admin/*"
  to = "${VITE_API_URL}/admin/:splat"
  status = 301
  force = true

# Edge function for OG meta tags (crawler detection)
[[edge_functions]]
  function = "og-meta"
  path = "/"

[[edge_functions]]
  function = "og-meta"
  path = "/blog/*"

[[edge_functions]]
  function = "og-meta"
  path = "/projects/*"

[[edge_functions]]
  function = "og-meta"
  path = "/shares/*"

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
