[build]
  command = "yarn build"

# After each successful deploy (which purges the durable CDN cache), crawl
# the sitemap so every page is warm at the edge before visitors arrive.
[[plugins]]
  package = "./plugins/warm-pages"

# Redirect admin to Laravel backend
[[redirects]]
  from = "/admin/*"
  to = "https://api.nickbell.dev/admin/:splat"
  status = 301
  force = true

# RSS feed proxy to backend
[[redirects]]
  from = "/feed"
  to = "https://api.nickbell.dev/feed"
  status = 200
  force = true
